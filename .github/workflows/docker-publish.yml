# Build and push the RunPod Orchestrator Docker image to Docker Hub.
#
# Image: mrffilipe/runpod-orchestrator
#
# Triggers:
#   - Manual run (workflow_dispatch)
#   - Push tag docker-v* (e.g. docker-v1.0.0)
#
# Required repository secret:
#   DOCKERHUB_TOKEN — access token for user mrffilipe (push permission)

name: Docker publish

on:
  push:
    tags:
      - "docker-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mrffilipe
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mrffilipe/runpod-orchestrator
          tags: |
            type=semver,pattern={{version}},prefix=docker-v
            type=semver,pattern={{major}}.{{minor}},prefix=docker-v
            type=semver,pattern={{major}},prefix=docker-v
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runpod-orchestrator
          cache-to: type=gha,mode=max,scope=runpod-orchestrator
